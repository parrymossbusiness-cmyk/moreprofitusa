<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>See How It Works | More Profit USA</title>
<meta name="description" content="Watch how the Lead Foundation Engine turns missed calls into booked jobs for home service businesses.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0E1725;
    --white: #FFFFFF;
    --green: #1F8A4C;
    --white-70: rgba(255, 255, 255, 0.70);
    --font-display: "Anton", "Oswald", Impact, sans-serif;
    --font-body: "Inter", system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--navy);
  }

  body {
    font-family: var(--font-body);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
    -webkit-font-smoothing: antialiased;
  }

  a { text-decoration: none; }

  .page {
    width: 100%;
    max-width: 960px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 18px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 28px;
  }

  .logo span { color: var(--green); }

  h1 {
    font-family: var(--font-display);
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    color: var(--white);
    font-size: clamp(28px, 4.5vw, 48px);
    line-height: 1.05;
    margin-bottom: 14px;
  }

  .sub {
    max-width: 560px;
    font-size: 16px;
    line-height: 1.6;
    color: var(--white-70);
    margin-bottom: 36px;
  }

  .video-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
  }

  .video-wrapper iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 52px;
    padding: 0 44px;
    margin-top: 36px;
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--white);
    background: var(--green);
    border-radius: 4px;
    transition: opacity 0.15s ease;
  }

  .btn-primary:hover { opacity: 0.88; }

  @media (max-width: 600px) {
    .btn-primary { width: 100%; }
  }
</style>
</head>
<body>

<div class="page">
  <a class="logo" href="/">More Profit <span>USA</span></a>

  <h1>See how it works.</h1>
  <p class="sub">Watch how the Lead Foundation Engine turns a missed call into a booked job.</p>

  <div class="video-wrapper">
    <iframe
      src="https://www.youtube-nocookie.com/embed/f774a6cOsZE?rel=0"
      title="How the Lead Foundation Engine Works"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

  <a class="btn-primary" href="tel:3103453033">Book a Free Call</a>
</div>

</body>
</html>
